name: deploy

on:
  push:
    branches: [main]
    paths:
      - "adapter/**"
      - "mapper/**"
      - "redrive/**"
      - "infra/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: europe-west2
  AR_REPO: pulsestream

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [adapter, mapper, redrive]
    steps:
      - uses: actions/checkout@v7
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA }}
          token_format: access_token
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build & push ${{ matrix.service }}
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${{ matrix.service }}"
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
          docker build -t "${IMAGE}:${GITHUB_SHA}" ${{ matrix.service }}
          docker push "${IMAGE}:${GITHUB_SHA}"

  terraform:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v7
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA }}
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.5
      - name: Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TFSTATE_BUCKET }}" \
            -backend-config="prefix=terraform/state"
      - name: Plan
        run: |
          terraform plan -out=tfplan \
            -var="project_id=${PROJECT_ID}" \
            -var="image_tag=${GITHUB_SHA}" \
            -var="ar_repo_url=${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}"
      - name: Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
